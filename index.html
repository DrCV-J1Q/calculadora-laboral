<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr CV - Acceso Seguro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .contenedor {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
        }
        .contenedor-ancho {
            max-width: 750px;
        }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #444; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #1557b0; }
        
        .oculto { display: none; }

        .menu-navegacion {
            display: flex;
            justify-content: space-around;
            background: #1a73e8;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .pestana {
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            text-align: center;
            flex: 1;
        }
        .pestana:hover { background-color: rgba(255, 255, 255, 0.1); }
        .pestana.activa {
            background-color: white;
            color: #1a73e8;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .cuadro-resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 5px solid #1a73e8;
            border-radius: 4px;
        }
        span { font-weight: bold; color: #1a73e8; }
        .error { color: red; font-size: 12px; text-align: center; margin-top: 10px; }
        .saludo { text-align: center; color: #555; margin-bottom: 15px; font-size: 14px; font-weight: bold; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th { background-color: #1a73e8; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        
        .fila-totales {
            background-color: #e8f0fe !important;
            font-weight: bold;
            font-size: 14px;
        }
        
        .btn-tabla {
            color: white;
            padding: 5px 8px;
            font-size: 12px;
            margin-top: 0;
            width: auto;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 2px;
        }
        .btn-borrar { background-color: #dc3545; }
        .btn-borrar:hover { background-color: #bd2130; }
        .btn-editar { background-color: #ffc107; color: #333; }
        .btn-editar:hover { background-color: #e0a800; }

        @media print {
            body { background-color: white; color: black; display: block; padding: 0; }
            #seccionLogin, #seccionApp, .columna-accion, button, .saludo, .menu-navegacion {
                display: none !important;
            }
            .contenedor-ancho {
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
                max-width: 100% !important;
                width: 100% !important;
                display: block !important;
            }
            h2 { color: black !important; text-align: left; font-size: 24px; border-bottom: 2px solid #333; padding-bottom: 10px; }
            th { background-color: #f2f2f2 !important; color: black !important; font-weight: bold; }
            .fila-totales { background-color: #f9f9f9 !important; border-top: 2px solid black; }
        }
    </style>
</head>
<body>

    <div class="contenedor" id="seccionLogin">
        <h2>Dr CV - Login</h2>
        <label>Usuario:</label>
        <input type="text" id="usuarioInput" placeholder="Ingresa tu usuario">
        
        <label>Contraseña:</label>
        <input type="password" id="passInput" placeholder="••••••••">
        
        <button onclick="validarAcceso()">Entrar al Sistema</button>
        <p id="mensajeError" class="error oculto">Usuario o contraseña incorrectos</p>
    </div>

    <div id="pantallaApp" class="oculto">
        
        <div class="menu-navegacion">
            <div class="pestana activa" id="tabCalculadora" onclick="cambiarMenu('CALCULADORA')">🧮 Calculadora</div>
            <div class="pestana" id="tabReporte" onclick="cambiarMenu('REPORTE')">📊 Reporte Mensual</div>
        </div>

        <p id="saludoUsuario" class="saludo"></p>

        <div class="contenedor" id="seccionApp">
            <h2 id="tituloCalculadora">Calculadora Laboral</h2>
            
            <label>Fecha del Turno:</label>
            <input type="date" id="fechaTurno">

            <label>Sueldo Base ($):</label>
            <input type="number" id="sueldo" value="480">

            <label>Tipo de Jornada:</label>
            <select id="tipoDia">
                <option value="NORMAL">Normal (50%)</option>
                <option value="FIN_DE_SEMANA">Fin de Semana (100%)</option>
                <option value="FERIADO">Feriado (100%)</option>
            </select>

            <label>Hora de Entrada:</label>
            <input type="time" id="entrada">

            <label>Hora de Salida:</label>
            <input type="time" id="salida">

            <button onclick="calcularExtras()">Calcular Ahora</button>
            <button onclick="guardarRegistro()" id="btnGuardar" style="background-color: #28a745;" disabled>Guardar Registro</button>
            <button onclick="cerrarSesion()" style="background-color: #6c757d;">Cerrar Sesión</button>

            <div class="cuadro-resultado">
                <p>Horas al 50%: <span id="horas50">0.00</span></p>
                <p>Horas al 100%: <span id="horas100">0.00</span></p>
                <p>Valor a Pagar: <span id="pagoFinal">$0.00</span></p>
            </div>
        </div>

        <div class="contenedor contenedor-ancho oculto" id="bloqueReporte">
            <h2>Reporte de Horas Extras</h2>
            <div style="overflow-x: auto;">
                <table id="tablaRegistros">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Jornada</th>
                            <th>Entrada</th>
                            <th>Salida</th>
                            <th>H. 50%</th>
                            <th>H. 100%</th>
                            <th>Total Pagar</th>
                            <th class="columna-accion">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaRegistros">
                        </tbody>
                    <tfoot id="pieTotales">
                        </tfoot>
                </table>
            </div>
            
            <button onclick="imprimirReporte()" id="btnPDF" style="background-color: #e67e22; margin-top: 25px;" disabled>📄 Exportar / Imprimir PDF</button>
            <button onclick="reiniciarMes()" id="btnReiniciar" style="background-color: #dc3545; margin-top: 10px;" disabled>⚠️ Cerrar y Reiniciar Mes Nuevo</button>
        </div>

    </div>

    <script>
        const CLIENTES_REGISTRADOS = [
            { user: "jimmy", pass: "12345", nombre: "Jimmy Quituisaca" },
            { user: "cliente1", pass: "fortius2026", nombre: "Usuario Fortius" },
            { user: "dr.cv", pass: "admin", nombre: "Administrador Dr CV" },
            { user: "jossy", pass: "2468", nombre: "Jossy Bienvenida" }
        ];

        let calculoActual = null;
        let usuarioActivo = "";
        let nombreActivo = "";
        let idEdicionActual = null;

        window.onload = function() {
            const hoy = new Date().toISOString().split('T')[0];
            if(document.getElementById('fechaTurno')) {
                document.getElementById('fechaTurno').value = hoy;
            }
        }

        function validarAcceso() {
            const userInput = document.getElementById('usuarioInput').value.trim().toLowerCase();
            const passInput = document.getElementById('passInput').value.trim();
            const errorMsg = document.getElementById('mensajeError');

            const cliente = CLIENTES_REGISTRADOS.find(c => c.user === userInput && c.pass === passInput);

            if (cliente) {
                usuarioActivo = cliente.user;
                nombreActivo = cliente.nombre;
                document.getElementById('seccionLogin').classList.add('oculto');
                document.getElementById('pantallaApp').classList.remove('oculto');
                document.getElementById('saludoUsuario').innerText = "Bienvenido, " + cliente.nombre;
                errorMsg.classList.add('oculto');
                
                cambiarMenu('CALCULADORA');
                mostrarRegistros();
            } else {
                errorMsg.classList.remove('oculto');
            }
        }

        function cambiarMenu(menu) {
            const tabCalc = document.getElementById('tabCalculadora');
            const tabRep = document.getElementById('tabReporte');
            const seccionCalc = document.getElementById('seccionApp');
            const seccionRep = document.getElementById('bloqueReporte');

            if (menu === 'CALCULADORA') {
                tabCalc.classList.add('activa');
                tabRep.classList.remove('activa');
                seccionCalc.classList.remove('oculto');
                seccionRep.classList.add('oculto');
            } else if (menu === 'REPORTE') {
                tabRep.classList.add('activa');
                tabCalc.classList.remove('activa');
                seccionRep.classList.remove('oculto');
                seccionCalc.classList.add('oculto');
            }
        }

        function cerrarSesion() {
            location.reload(); 
        }

        function calcularExtras() {
            const fechaVal = document.getElementById('fechaTurno').value;
            const sueldoBase = parseFloat(document.getElementById('sueldo').value);
            const tipoDia = document.getElementById('tipoDia').value;
            const entrada = document.getElementById('entrada').value;
            const salida = document.getElementById('salida').value;

            if (!fechaVal || !entrada || !salida) {
                alert("Por favor, ingresa la fecha y las horas de entrada y salida");
                return;
            }

            const partesFecha = fechaVal.split('-');
            const fechaFormateada = `${partesFecha[2]}/${partesFecha[1]}/${partesFecha[0]}`;

            const horaInicio = new Date(`2026-01-01T${entrada}:00`);
            const horaFin = new Date(`2026-01-01T${salida}:00`);
            let diferenciaHoras = (horaFin - horaInicio) / (1000 * 60 * 60);

            if (diferenciaHoras < 0) diferenciaHoras += 24;

            let horas50 = 0, horas100 = 0, pagoTotal = 0;
            const valorHoraNormal = sueldoBase / 240;

            if (tipoDia === "NORMAL") {
                horas50 = Math.max(0, diferenciaHoras - 8);
                pagoTotal = horas50 * valorHoraNormal * 1.5;
            } else if (tipoDia === "FIN_DE_SEMANA" || tipoDia === "FERIADO") {
                horas100 = diferenciaHoras;
                pagoTotal = horas100 * valorHoraNormal * 2;
            }

            document.getElementById('horas50').innerText = horas50.toFixed(2);
            document.getElementById('horas100').innerText = horas100.toFixed(2);
            document.getElementById('pagoFinal').innerText = `$${pagoTotal.toFixed(2)}`;

            let jornadaTexto = "Normal (50%)";
            if(tipoDia === "FIN_DE_SEMANA") jornadaTexto = "Fin de Semana (100%)";
            if(tipoDia === "FERIADO") jornadaTexto = "Feriado (100%)";

            calculoActual = {
                usuario: usuarioActivo,
                fecha: fechaFormateada,
                fechaRaw: fechaVal,
                jornada: jornadaTexto,
                jornadaRaw: tipoDia,
                entrada: entrada,
                salida: salida,
                h50: horas50.toFixed(2),
                h100: horas100.toFixed(2),
                total: pagoTotal.toFixed(2)
            };

            document.getElementById('btnGuardar').disabled = false;
        }

        function guardarRegistro() {
            if (!calculoActual) return;

            let registros = JSON.parse(localStorage.getItem('registrosHoras')) || [];
            
            if (idEdicionActual !== null) {
                registros[idEdicionActual] = calculoActual;
                idEdicionActual = null;
                document.getElementById('tituloCalculadora').innerText = "Calculadora Laboral";
                document.getElementById('btnGuardar').innerText = "Guardar Registro";
                document.getElementById('btnGuardar').style.backgroundColor = "#28a745";
            } else {
                registros.push(calculoActual);
            }
            
            localStorage.setItem('registrosHoras', JSON.stringify(registros));
            mostrarRegistros();
            
            calculoActual = null;
            document.getElementById('btnGuardar').disabled = true;
            alert("Registro guardado con éxito.");
        }

        function mostrarRegistros() {
            const lista = document.getElementById('listaRegistros');
            const pieTotales = document.getElementById('pieTotales');
            const btnPDF = document.getElementById('btnPDF');
            const btnReiniciar = document.getElementById('btnReiniciar');
            lista.innerHTML = "";
            pieTotales.innerHTML = "";

            let registros = JSON.parse(localStorage.getItem('registrosHoras')) || [];
            let registrosFiltrados = registros.filter(r => r.usuario === usuarioActivo);

            if (registrosFiltrados.length === 0) {
                lista.innerHTML = `<tr><td colspan="8" style="color: #888;">No tienes horas extras registradas aún.</td></tr>`;
                btnPDF.disabled = true;
                btnReiniciar.disabled = true;
                return;
            }

            btnPDF.disabled = false;
            btnReiniciar.disabled = false;

            let sumaH50 = 0;
            let sumaH100 = 0;
            let sumaTotalPagar = 0;

            registros.forEach((reg, indexReal) => {
                if (reg.usuario === usuarioActivo) {
                    sumaH50 += parseFloat(reg.h50);
                    sumaH100 += parseFloat(reg.h100);
                    sumaTotalPagar += parseFloat(reg.total);

                    let fila = `<tr>
                        <td><b>${reg.fecha}</b></td>
                        <td>${reg.jornada}</td>
                        <td>${reg.entrada}</td>
                        <td>${reg.salida}</td>
                        <td>${reg.h50}</td>
                        <td>${reg.h100}</td>
                        <td style="color: #28a745; font-weight: bold;">$${reg.total}</td>
                        <td class="columna-accion">
                            <button class="btn-tabla btn-editar" onclick="cargarParaEditar(${indexReal})">✏️</button>
                            <button class="btn-tabla btn-borrar" onclick="eliminarRegistro(${indexReal})">Borrar</button>
                        </td>
                    </tr>`;
                    lista.innerHTML += fila;
                }
            });

            let filaTotales = `<tr class="fila-totales">
                <td colspan="4" style="text-align: right; padding-right: 15px;">TOTAL GENERAL:</td>
                <td>${sumaH50.toFixed(2)}</td>
                <td>${sumaH100.toFixed(2)}</td>
                <td style="color: #1a73e8;">$${sumaTotalPagar.toFixed(2)}</td>
                <td class="columna-accion"></td>
            </tr>`;
            pieTotales.innerHTML = filaTotales;
        }

        function cargarParaEditar(index) {
            let registros = JSON.parse(localStorage.getItem('registrosHoras')) || [];
            let reg = registros[index];

            idEdicionActual = index;

            document.getElementById('fechaTurno').value = reg.fechaRaw || "";
            document.getElementById('tipoDia').value = reg.jornadaRaw || "NORMAL";
            document.getElementById('entrada').value = reg.entrada;
            document.getElementById('salida').value = reg.salida;

            document.getElementById('horas50').innerText = reg.h50;
            document.getElementById('horas100').innerText = reg.h100;
            document.getElementById('pagoFinal').innerText = `$${reg.total}`;

            document.getElementById('tituloCalculadora').innerText = "✏️ Modificando Registro";
            document.getElementById('btnGuardar').innerText = "Actualizar Cambios";
            document.getElementById('btnGuardar').style.backgroundColor = "#e67e22";
            document.getElementById('btnGuardar').disabled = false;

            cambiarMenu('CALCULADORA');
        }

        function eliminarRegistro(index) {
            if (confirm("¿Estás seguro de que deseas eliminar este registro?")) {
                let registros = JSON.parse(localStorage.getItem('registrosHoras')) || [];
                registros.splice(index, 1);
                localStorage.setItem('registrosHoras', JSON.stringify(registros));
                mostrarRegistros();
                
                if(idEdicionActual === index){
                    idEdicionActual = null;
                    document.getElementById('tituloCalculadora').innerText = "Calculadora Laboral";
                    document.getElementById('btnGuardar').innerText = "Guardar Registro";
                    document.getElementById('btnGuardar').style.backgroundColor = "#28a745";
                }
            }
        }

        function imprimirReporte() {
            window.print();
        }

        function reiniciarMes() {
            if (confirm("⚠️ ADVERTENCIA: Asegúrate de haber guardado tu PDF antes de continuar. Esta acción borrará toda la tabla actual de forma permanente para iniciar el nuevo mes limpio. ¿Deseas borrar la tabla?")) {
                let registros = JSON.parse(localStorage.getItem('registrosHoras')) || [];
                let registrosRestantes = registros.filter(r => r.usuario !== usuarioActivo);
                localStorage.setItem('registrosHoras', JSON.stringify(registrosRestantes));

                mostrarRegistros();
                alert("Tabla reiniciada con éxito. Ya puedes empezar el nuevo mes.");
            }
        }
    </script>
</body>
</html>
