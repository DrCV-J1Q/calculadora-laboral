<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr CV - Acceso Seguro</title>
    <style>
        :root {
            --primary: #1e40af;
            --primary-hover: #1e3a8a;
            --success: #10b981;
            --success-hover: #059669;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: #334155;
        }

        .contenedor {
            background: #ffffff;
            padding: 35px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 440px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .contenedor-ancho {
            max-width: 800px;
        }

        h2 { 
            color: #1e3a8a; 
            text-align: center; 
            margin-bottom: 25px; 
            margin-top: 0; 
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        label { 
            display: block; 
            margin-top: 18px; 
            font-weight: 600; 
            color: #475569; 
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, button {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            box-sizing: border-box;
            font-size: 14px;
